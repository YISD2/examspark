<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>Campfire | Student</title>
    
    <!-- ExamSpark Proxima Nova Font Emulation -->
    <style>
        @import url('https://googleapis.com');
        
        body {
            margin: 0;
            padding: 0;
            font-family: "proxima-nova", "Open Sans", sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Full Screen Loader Container */
        #loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        /* Animated Spinner - Matches your Image */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e6e6e6; /* Light gray base */
            border-top: 6px solid #555555; /* Dark gray moving dot */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        /* "Loading..." Text Style from your Image */
        .loading-text {
            color: #666666;
            font-size: 28px;
            font-weight: 400;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Content Container (Hidden until loaded) */
        #question-display {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- The Spinner View -->
    <div id="loader-container">
        <div class="spinner"></div>
        <p class="loading-text">Loading...</p>
    </div>

    <!-- The Content View -->
    <div id="question-display"></div>

    <script>
        /** 
         * 1. Capture the URL and Exam ID
         * This handles: student.examspark.schoolobjects.online/launch/exam/bbae6d31...
         */
        const fullPath = window.location.pathname;
        const examID = fullPath.split('/').pop() || "default-exam";
        console.log("Loading...:", examID);

        /**
         * 2. Load the actual question files from your folder
         */
        async function loadExamData() {
            const display = document.getElementById('question-display');
            const loader = document.getElementById('loader-container');

            try {
                // Adjust 'q1.html' to the actual name of your first file in the folder
                const response = await fetch(`./questions/q1.html`); 
                
                if (!response.ok) throw new Error('File not found');
                
                const htmlContent = await response.text();

                // Small delay to show the spinner (ExamSpark style)
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        display.innerHTML = htmlContent;
                        display.style.display = 'block';
                    }, 500);
                }, 1500);

            } catch (error) {
                document.querySelector('.loading-text').innerText = "Loading...";
                console.error("Error loading file:", error);
            }
        }

        // Run the loader
        window.onload = loadExamData;
    </script>
</body>
</html>
